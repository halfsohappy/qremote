[env]
platform = espressif32
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600
; Native USB presents as a TinyUSB composite device: CDC (serial console,
; carries ESP_LOG output) + NCM (network). Logs and the USB-NCM link
; share one USB-C — no UART dongle needed.
board_upload.use_1200bps_touch = true

[env:feathers3]
board = um_feathers3
; Shared defaults only — no display hardware.
board_build.esp-idf.sdkconfig_defaults = sdkconfig.defaults

[env:waveshare_amoled]
; Waveshare ESP32-S3-Touch-AMOLED-1.64 (280x456 SH8601 QSPI AMOLED, octal
; PSRAM required for LVGL framebuffers). No PIO board def, so we base on
; esp32-s3-devkitc-1 and override flash/PSRAM via sdkconfig.
;
; PIO's espidf builder only auto-picks `sdkconfig.defaults` as input. We
; layer waveshare-specific overrides on top via the CMake `SDKCONFIG_DEFAULTS`
; variable, passed through `build.cmake_extra_args`.
board = esp32-s3-devkitc-1
board_build.flash_size = 16MB
board_build.cmake_extra_args = -DSDKCONFIG_DEFAULTS="sdkconfig.defaults;sdkconfig.defaults.waveshare_amoled"
