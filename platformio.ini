[env:feathers3]
platform = espressif32
board = um_feathers3
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; Native USB presents as a TinyUSB composite device: CDC (serial console,
; carries ESP_LOG output) + NCM (network). Logs and the USB-NCM link
; share one USB-C — no UART dongle needed. If the board auto-reset via
; 1200bps touch misbehaves once CDC is up, we can disable it here.
board_upload.use_1200bps_touch = true
