[env:xiao_esp32s3]
platform = espressif32
board = seeed_xiao_esp32s3
framework = espidf
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
upload_speed = 921600

; The XIAO ESP32-S3 has only the native USB port — no UART-serial bridge.
; After our firmware runs, native USB becomes USB-NCM, so USB-CDC logs are
; unavailable. For logs, wire a USB-UART dongle to GPIO43 (TX) / GPIO44 (RX).
; For re-uploads: hold the BOOT (B) button while tapping RESET (R) to enter
; the ROM download mode, then release BOOT.
board_upload.use_1200bps_touch = false
